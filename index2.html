<!DOCTYPE html>
<html>
<head>
<title>Brain Challenge Game</title>

<style>
body{
text-align:center;
font-family:Arial;
background:#eef7ff;
}

canvas{
border:3px solid black;
background:#f0fff0;
}

button{
padding:10px;
margin:5px;
font-size:16px;
}
</style>
</head>

<body>

<h1>🧠 Brain Challenge</h1>

<button onclick="startGame('easy')">Easy Mode</button>
<button onclick="startGame('hard')">Hard Mode</button>
<button onclick="resetGame()">Reset</button>

<p>Score: <span id="score">0</span></p>
<p>Time: <span id="time">60</span></p>

<canvas id="gameCanvas" width="600" height="450"></canvas>

<script>

const canvas=document.getElementById("gameCanvas")
const ctx=canvas.getContext("2d")

let player={x:300,y:200,size:30,speed:5}

let foods=[]
let fruits=[]
let brains=[]

let score=0
let time=60
let gameRunning=false
let mode="easy"

let keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

function startGame(selectedMode){

mode=selectedMode

foods=[]
fruits=[]
brains=[]

score=0
time=60
player.size=30
player.speed=5

spawnFoods()
spawnFruits()
spawnBrains()

gameRunning=true

startTimer()
increaseDifficulty()
gameLoop()

}

function resetGame(){
location.reload()
}

function startTimer(){

let interval=setInterval(()=>{

if(!gameRunning) return

time--
document.getElementById("time").innerText=time

if(time<=0){
gameRunning=false
alert("⏱ Time Up! Final Score: "+score)
clearInterval(interval)
}

},1000)

}

function increaseDifficulty(){

setInterval(()=>{

if(!gameRunning) return

player.speed+=0.5

brains.forEach(b=>{
b.dx*=1.1
b.dy*=1.1
})

},5000)

}

function spawnFoods(){

const foodTypes=["🍔","🥪","🍗","🍕"]

for(let i=0;i<4;i++){

foods.push({
x:Math.random()*560,
y:Math.random()*420,
type:foodTypes[Math.floor(Math.random()*foodTypes.length)]
})

}

}

function spawnFruits(){

const fruitTypes=["🥭","🍎","🥝","🍇"]

for(let i=0;i<4;i++){

fruits.push({
x:Math.random()*560,
y:Math.random()*420,
type:fruitTypes[Math.floor(Math.random()*fruitTypes.length)]
})

}

}

function spawnBrains(){

let brainCount=2
let speedMultiplier=1

if(mode==="hard"){
brainCount=4
speedMultiplier=2
}

for(let i=0;i<brainCount;i++){

brains.push({
x:Math.random()*560,
y:Math.random()*420,
dx:((Math.random()*4)+2)*speedMultiplier,
dy:((Math.random()*4)+2)*speedMultiplier
})

}

}

function movePlayer(){

if(keys["ArrowUp"]||keys["w"]) player.y-=player.speed
if(keys["ArrowDown"]||keys["s"]) player.y+=player.speed
if(keys["ArrowLeft"]||keys["a"]) player.x-=player.speed
if(keys["ArrowRight"]||keys["d"]) player.x+=player.speed

if(player.x<0) player.x=0
if(player.y<0) player.y=0

if(player.x>canvas.width-player.size)
player.x=canvas.width-player.size

if(player.y>canvas.height-player.size)
player.y=canvas.height-player.size

}

function drawPlayer(){

ctx.font=player.size+"px Arial"
ctx.fillText("🧑",player.x,player.y)

}

function drawFoods(){

ctx.font="26px Arial"

foods.forEach((f,index)=>{

ctx.fillText(f.type,f.x,f.y)

if(
player.x<f.x+20 &&
player.x+player.size>f.x &&
player.y<f.y+20 &&
player.y+player.size>f.y
){

foods.splice(index,1)

player.size+=5
score--

document.getElementById("score").innerText=score

foods.push({
x:Math.random()*560,
y:Math.random()*420,
type:["🍔","🥪","🍗","🍕"][Math.floor(Math.random()*4)]
})

}

})

}

function drawFruits(){

ctx.font="26px Arial"

fruits.forEach((f,index)=>{

ctx.fillText(f.type,f.x,f.y)

if(
player.x<f.x+20 &&
player.x+player.size>f.x &&
player.y<f.y+20 &&
player.y+player.size>f.y
){

fruits.splice(index,1)

player.size-=4
if(player.size<15) player.size=15

score++

document.getElementById("score").innerText=score

fruits.push({
x:Math.random()*560,
y:Math.random()*420,
type:["🥭","🍎","🥝","🍇"][Math.floor(Math.random()*4)]
})

}

})

}

function moveBrains(){

brains.forEach(b=>{

b.x+=b.dx
b.y+=b.dy

if(b.x<0||b.x>canvas.width){
b.dx*=-1
}

if(b.y<0||b.y>canvas.height){
b.dy*=-1
}

})

}

function drawBrains(){

ctx.font="26px Arial"

brains.forEach(b=>{

ctx.fillText("🧠",b.x,b.y)

if(
player.x<b.x+20 &&
player.x+player.size>b.x &&
player.y<b.y+20 &&
player.y+player.size>b.y
){

gameRunning=false
alert("🧠 Brain touched you! Game Over\nScore: "+score)

}

})

}

function gameLoop(){

if(!gameRunning) return

ctx.clearRect(0,0,canvas.width,canvas.height)

movePlayer()
moveBrains()

drawPlayer()
drawFoods()
drawFruits()
drawBrains()

requestAnimationFrame(gameLoop)

}

</script>

</body>
</html>
